services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oficina_demo}
      POSTGRES_USER: ${POSTGRES_USER:-oficina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oficina123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oficina -d oficina_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      PORT: ${PORT:-4000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://rabbitmq:5672}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-demo-internal-key}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-oficina_demo}
      POSTGRES_USER: ${POSTGRES_USER:-oficina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oficina123}
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "4001:4000"

  media-worker:
    build:
      context: ./worker
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://rabbitmq:5672}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-media.uploaded}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:4000}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-demo-internal-key}
    depends_on:
      - rabbitmq
      - backend

  notification-worker:
    build:
      context: ./notification-worker
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://rabbitmq:5672}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:4000}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-demo-internal-key}
    depends_on:
      - rabbitmq
      - backend

  inventory-worker:
    build:
      context: ./inventory-worker
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://rabbitmq:5672}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:4000}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-demo-internal-key}
    depends_on:
      - rabbitmq
      - backend

  audit-worker:
    build:
      context: ./audit-worker
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://rabbitmq:5672}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-oficina_demo}
      POSTGRES_USER: ${POSTGRES_USER:-oficina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oficina123}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4001}
    depends_on:
      - backend
    ports:
      - "3001:3000"

volumes:
  postgres_data:
