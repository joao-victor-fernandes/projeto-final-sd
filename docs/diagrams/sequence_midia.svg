<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Helvetica, Arial, sans-serif">
  <style>
    .head { fill: #e3f2fd; stroke: #1565c0; stroke-width: 2; }
    .label { font-weight: bold; font-size: 12px; text-anchor: middle; }
    .lifeline { stroke: #999; stroke-width: 1; stroke-dasharray: 3 3; }
    .msg { stroke: #2c3e50; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    .msg-async { stroke: #d84315; stroke-width: 1.5; fill: none; marker-end: url(#arrow-async); stroke-dasharray: 4 3; }
    .arrow-label { font-size: 10px; fill: #2c3e50; }
    .activation { fill: #fff9c4; stroke: #f9a825; stroke-width: 1; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2c3e50" />
    </marker>
    <marker id="arrow-async" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d84315" />
    </marker>
  </defs>

  <text x="500" y="30" class="label" font-size="16">Sequence Diagram — Upload de mídia com processamento assíncrono</text>

  <!-- Heads -->
  <rect x="40" y="55" width="120" height="35" rx="4" class="head" />
  <text x="100" y="78" class="label">Mecânico</text>
  <line x1="100" y1="90" x2="100" y2="580" class="lifeline" />

  <rect x="200" y="55" width="120" height="35" rx="4" class="head" />
  <text x="260" y="78" class="label">Frontend</text>
  <line x1="260" y1="90" x2="260" y2="580" class="lifeline" />

  <rect x="360" y="55" width="120" height="35" rx="4" class="head" />
  <text x="420" y="78" class="label">Backend API</text>
  <line x1="420" y1="90" x2="420" y2="580" class="lifeline" />

  <rect x="520" y="55" width="120" height="35" rx="4" class="head" />
  <text x="580" y="78" class="label">PostgreSQL</text>
  <line x1="580" y1="90" x2="580" y2="580" class="lifeline" />

  <rect x="680" y="55" width="120" height="35" rx="4" class="head" />
  <text x="740" y="78" class="label">RabbitMQ</text>
  <line x1="740" y1="90" x2="740" y2="580" class="lifeline" />

  <rect x="840" y="55" width="120" height="35" rx="4" class="head" />
  <text x="900" y="78" class="label">Media Worker</text>
  <line x1="900" y1="90" x2="900" y2="580" class="lifeline" />

  <!-- Mensagens -->
  <line x1="100" y1="115" x2="260" y2="115" class="msg" />
  <text x="155" y="110" class="arrow-label">seleciona 3 vídeos</text>

  <line x1="260" y1="145" x2="420" y2="145" class="msg" />
  <text x="290" y="140" class="arrow-label">POST /api/work-orders/:id/media (multipart)</text>

  <rect x="415" y="145" width="10" height="240" class="activation" />

  <line x1="420" y1="180" x2="580" y2="180" class="msg" />
  <text x="450" y="175" class="arrow-label">INSERT media_assets (status=UPLOADED)</text>

  <line x1="580" y1="200" x2="420" y2="200" class="msg" />
  <text x="450" y="195" class="arrow-label">ok</text>

  <line x1="420" y1="230" x2="740" y2="230" class="msg-async" />
  <text x="440" y="225" class="arrow-label">publish (oficina.events, routingKey=media.uploaded)</text>

  <line x1="740" y1="260" x2="900" y2="260" class="msg-async" />
  <text x="770" y="255" class="arrow-label">deliver (queue media.uploaded)</text>

  <rect x="895" y="260" width="10" height="270" class="activation" />

  <line x1="420" y1="290" x2="260" y2="290" class="msg" />
  <text x="290" y="285" class="arrow-label">201 Created (com IDs das mídias)</text>

  <line x1="260" y1="320" x2="100" y2="320" class="msg" />
  <text x="135" y="315" class="arrow-label">mostra "Enviado para fila"</text>

  <!-- Worker processa -->
  <line x1="900" y1="350" x2="420" y2="350" class="msg" />
  <text x="500" y="345" class="arrow-label">POST /internal/media/:id/status {PROCESSING}</text>

  <line x1="420" y1="380" x2="580" y2="380" class="msg" />
  <text x="460" y="375" class="arrow-label">UPDATE media_assets</text>

  <!-- Worker simula trabalho -->
  <line x1="900" y1="420" x2="900" y2="450" class="msg" stroke-dasharray="2 2" />
  <text x="910" y="440" class="arrow-label">simula 2s (ffmpeg, thumbnail, etc.)</text>

  <line x1="900" y1="470" x2="420" y2="470" class="msg" />
  <text x="500" y="465" class="arrow-label">POST /internal/media/:id/status {PROCESSED}</text>

  <line x1="420" y1="500" x2="740" y2="500" class="msg-async" />
  <text x="450" y="495" class="arrow-label">publish media.processed</text>

  <text x="500" y="555" class="arrow-label" font-style="italic">notification-worker, audit-worker e outros consumirão media.processed em paralelo</text>
</svg>
